<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FunfzehnSmart</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* bintang bergerak */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:60px 60px;
opacity:0.4;
animation:stars 60s linear infinite;
}
@keyframes stars{
from{transform:translate(0,0);}
to{transform:translate(-500px,-500px);}
}
.logo{
font-size:48px;
margin-top:120px;
}
.search{
margin-top:30px;
}
.search input{
width:300px;
padding:10px;
border-radius:20px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:20px;
margin-top:10px;
cursor:pointer;
}
.lang a{
color:white;
margin:0 5px;
cursor:pointer;
}
</style>
</head>
<body>
<div class="logo">⭐ FunfzehnSmart</div>

<div class="search">
<span class="material-icons">search</span>
<input id="searchInput" placeholder="Cari teknologi...">
<br>
<button id="btn" onclick="search()">Cari Teknologi</button>
</div>

<div class="lang">
<a onclick="setID()">Indonesia</a> |
<a onclick="setDE()">Deutsch</a>
</div>

<script>
function search(){
let q=document.getElementById("searchInput").value;
window.location.href="https://www.google.com/search?q=technology+"+q;
}

function setID(){
searchInput.placeholder="Cari teknologi...";
btn.innerText="Cari Teknologi";
}
function setDE(){
searchInput.placeholder="Technologie suchen...";
btn.innerText="Technologie suchen";
}
</script>

</body>
</html>
